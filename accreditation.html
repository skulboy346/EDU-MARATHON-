<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Desks | Accreditation</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22><path fill=%22%23ff2a2a%22 d=%22M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z%22/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style> body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; } </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="login-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 p-4 transition-all">
        <div class="bg-slate-800 p-8 max-w-sm w-full text-center rounded-xl border border-slate-700 shadow-2xl">
            <i class="fa-solid fa-qrcode text-5xl text-white mb-4"></i>
            <h2 class="text-2xl font-black text-white mb-2">ACCREDITATION</h2>
            <p class="text-xs text-slate-400 mb-6">Enter your assigned Desk PIN</p>
            <input type="password" id="desk-pin" class="w-full bg-slate-900 text-white rounded-lg p-4 text-center text-xl font-bold mb-4 uppercase outline-none focus:border-white border border-slate-600 shadow-inner">
            <button onclick="loginDesk()" class="w-full bg-slate-200 text-slate-900 font-bold py-4 rounded-lg hover:bg-white transition shadow-lg">OPEN DESK</button>
            <p id="login-error" class="text-[#ff2a2a] text-xs font-bold mt-4 hidden tracking-widest uppercase">Invalid Desk PIN</p>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col min-h-screen">
        <nav id="desk-nav" class="p-4 border-b flex justify-between items-center shadow-lg">
            <h1 id="desk-title" class="text-2xl font-black uppercase">DESK</h1>
            <p class="text-sm font-bold text-white bg-slate-900 px-3 py-1 rounded">In Today: <span id="count">0</span></p>
        </nav>
        <div class="p-4 max-w-4xl mx-auto w-full">
            <div class="relative mb-6">
                <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search" onkeyup="filterRunners()" placeholder="Search Name or Bib..." class="w-full bg-slate-800 py-4 pl-12 pr-4 rounded-xl text-white font-bold outline-none focus:ring-2 focus:ring-white border border-slate-600 transition shadow-inner">
            </div>
            <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-20"></div>
        </div>
        
        <div class="fixed bottom-6 right-6">
            <button onclick="if(window.loadDeskData) window.loadDeskData()" class="bg-slate-800 text-white p-4 rounded-full shadow-[0_0_15px_rgba(0,0,0,0.8)] border border-slate-700 hover:bg-slate-700 transition flex items-center justify-center">
                <i class="fa-solid fa-rotate text-xl"></i>
            </button>
        </div>
    </div>

    <script>
        function loginDesk() {
            const pinInput = document.getElementById('desk-pin');
            const errorMsg = document.getElementById('login-error');
            const pin = pinInput.value.trim().toUpperCase();
            
            const validPins = [
                '10KM26', '3KM26', 'CREW26', 
                'PROTO26', 'LOGIS26', 'MEDIC26', 'MEDIA26', 'TECH26'
            ];

            if(validPins.includes(pin)) {
                const modal = document.getElementById('login-modal');
                modal.style.display = 'none'; 
                
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                
                if(typeof window.activateDesk === 'function') {
                    window.activateDesk(pin);
                }
            } else {
                errorMsg.classList.remove('hidden');
                pinInput.value = ''; 
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('desk-pin').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') { loginDesk(); }
            });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATsVP-HTdN77pDg8Qlv8wMGnQoWTIboRU",
            authDomain: "edu-marathon-26.firebaseapp.com",
            projectId: "edu-marathon-26",
            storageBucket: "edu-marathon-26.firebasestorage.app",
            messagingSenderId: "424659083241",
            appId: "1:424659083241:web:856902379e142ac4177578"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let deskData = [];
        let activeConfig = {};

        // Helper to get today's date formatted nicely (e.g., "May 29")
        const getTodayDate = () => new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        // Helper to get the exact time (e.g., "06:45 AM")
        const getExactTime = () => new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        const cMap = {
            'orange': { nav: 'bg-orange-900/40 border-orange-500', text: 'text-orange-400', ring: 'focus:ring-orange-500', btn: 'bg-orange-600 hover:bg-orange-500', border: 'border-orange-500' },
            'green': { nav: 'bg-green-900/40 border-green-500', text: 'text-green-400', ring: 'focus:ring-green-500', btn: 'bg-green-600 hover:bg-green-500', border: 'border-green-500' },
            'blue': { nav: 'bg-blue-900/40 border-blue-500', text: 'text-blue-400', ring: 'focus:ring-blue-500', btn: 'bg-blue-600 hover:bg-blue-500', border: 'border-blue-500' },
            'purple': { nav: 'bg-purple-900/40 border-purple-500', text: 'text-purple-400', ring: 'focus:ring-purple-500', btn: 'bg-purple-600 hover:bg-purple-500', border: 'border-purple-500' },
            'yellow': { nav: 'bg-yellow-900/40 border-yellow-500', text: 'text-yellow-400', ring: 'focus:ring-yellow-500', btn: 'bg-yellow-600 hover:bg-yellow-500', border: 'border-yellow-500' },
            'red': { nav: 'bg-red-900/40 border-red-500', text: 'text-red-400', ring: 'focus:ring-red-500', btn: 'bg-red-600 hover:bg-red-500', border: 'border-red-500' },
            'pink': { nav: 'bg-pink-900/40 border-pink-500', text: 'text-pink-400', ring: 'focus:ring-pink-500', btn: 'bg-pink-600 hover:bg-pink-500', border: 'border-pink-500' },
            'teal': { nav: 'bg-teal-900/40 border-teal-500', text: 'text-teal-400', ring: 'focus:ring-teal-500', btn: 'bg-teal-600 hover:bg-teal-500', border: 'border-teal-500' }
        };

        window.activateDesk = async (pin) => {
            if(pin === '10KM26') activeConfig = { type: 'runner', filter: '10KM', db: 'edu_heart_run', color: 'orange', title: '10KM ENDURANCE DESK' };
            else if(pin === '3KM26') activeConfig = { type: 'runner', filter: '3KM', db: 'edu_heart_run', color: 'green', title: '3KM WALK DESK' };
            else if(pin === 'CREW26') activeConfig = { type: 'crew', filter: 'ALL', db: 'edu_heart_volunteers', color: 'blue', title: 'MASTER CREW DESK' };
            else if(pin === 'PROTO26') activeConfig = { type: 'crew', filter: 'Protocol', db: 'edu_heart_volunteers', color: 'purple', title: 'PROTOCOL LEAD' };
            else if(pin === 'LOGIS26') activeConfig = { type: 'crew', filter: 'Logistics', db: 'edu_heart_volunteers', color: 'yellow', title: 'LOGISTICS LEAD' };
            else if(pin === 'MEDIC26') activeConfig = { type: 'crew', filter: 'Medical', db: 'edu_heart_volunteers', color: 'red', title: 'MEDICAL LEAD' };
            else if(pin === 'MEDIA26') activeConfig = { type: 'crew', filter: 'Media', db: 'edu_heart_volunteers', color: 'pink', title: 'MEDIA LEAD' };
            else if(pin === 'TECH26') activeConfig = { type: 'crew', filter: 'Technical Official', db: 'edu_heart_volunteers', color: 'teal', title: 'TECH OFFICIAL LEAD' };

            const c = cMap[activeConfig.color];
            
            document.getElementById('desk-nav').className = `p-4 border-b flex justify-between items-center shadow-lg ${c.nav}`;
            document.getElementById('desk-title').innerText = activeConfig.title;
            document.getElementById('desk-title').className = `text-2xl font-black uppercase ${c.text}`;
            document.getElementById('search').className = `w-full bg-slate-800 py-4 pl-12 pr-4 rounded-xl text-white font-bold outline-none focus:ring-2 ${c.ring} border border-slate-600 transition shadow-inner`;

            window.loadDeskData();
        };

        window.loadDeskData = async () => {
            const c = cMap[activeConfig.color];
            document.getElementById('grid').innerHTML = `<div class="col-span-full text-center py-10 font-bold tracking-widest ${c.text}">SYNCING SECURE DATA...</div>`;
            const snap = await getDocs(collection(db, activeConfig.db));
            deskData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            if(activeConfig.filter !== 'ALL') {
                if (activeConfig.type === 'runner') {
                    deskData = deskData.filter(r => r.category && r.category.includes(activeConfig.filter));
                } else {
                    deskData = deskData.filter(r => r.role === activeConfig.filter);
                }
            }
            renderUI(deskData);
        };

        function renderUI(dataList) {
            const today = getTodayDate();
            const c = cMap[activeConfig.color];
            
            let presentCount = 0;
            if(activeConfig.type === 'crew') {
                // Check if any log entry starts with today's date
                presentCount = deskData.filter(r => r.attendance && r.attendance.some(log => log.startsWith(today))).length;
            } else {
                presentCount = deskData.filter(r => r.accredited).length;
            }
            document.getElementById('count').innerText = presentCount;

            const grid = document.getElementById('grid'); 
            grid.innerHTML = '';
            
            if(dataList.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-slate-500 font-bold mt-8">NO MATCHES FOUND</div>'; return; }

            dataList.forEach(r => {
                let isCleared = false;
                let btnText = "MARK PRESENT";
                let clearedText = "CLEARED";
                
                if (activeConfig.type === 'crew') {
                    isCleared = r.attendance && r.attendance.some(log => log.startsWith(today));
                    btnText = "MARK PRESENT TODAY";
                    clearedText = "CLEARED TODAY";
                } else {
                    isCleared = r.accredited;
                }

                const btn = isCleared 
                    ? `<button disabled class="w-full mt-3 bg-slate-800 text-slate-500 py-3 rounded-lg font-black tracking-widest border border-slate-700">${clearedText} <i class="fa-solid fa-check ml-1"></i></button>` 
                    : `<button onclick="checkIn('${r.id}')" id="b-${r.id}" class="w-full mt-3 ${c.btn} text-white py-3 rounded-lg font-black tracking-widest transition shadow-[0_0_15px_rgba(0,0,0,0.4)]">${btnText}</button>`;
                
                grid.innerHTML += `
                    <div class="bg-slate-800/80 p-5 rounded-2xl border-l-4 ${c.border} shadow-xl">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-black text-xl text-white uppercase">${r.title || ''} ${r.name}</h3>
                                <p class="text-xs ${c.text} font-bold uppercase tracking-widest">${r.bibNumber ? 'RUNNER' : r.role}</p>
                            </div>
                            <span class="text-3xl font-black font-[Oswald] text-slate-600">${r.bibNumber ? '#'+r.bibNumber : ''}</span>
                        </div>
                        ${btn}
                    </div>`;
            });
        }

        window.filterRunners = () => {
            const q = document.getElementById('search').value.toLowerCase();
            renderUI(deskData.filter(r => r.name.toLowerCase().includes(q) || (r.bibNumber && r.bibNumber.includes(q))));
        };

        window.checkIn = async (id) => {
            const msg = activeConfig.type === 'crew' ? "Check this Crew Member in for TODAY'S shift?" : "Check this Runner into the event?";
            if(!confirm(msg)) return;
            
            if (navigator.vibrate) navigator.vibrate(50);
            document.getElementById(`b-${id}`).innerText = '...';
            
            const record = deskData.find(r => r.id === id);
            const today = getTodayDate();
            const exactTime = getExactTime();
            
            // Format: "May 29 - 06:45 AM"
            const logEntry = `${today} - ${exactTime}`;

            try {
                if (activeConfig.type === 'crew') {
                    await updateDoc(doc(db, activeConfig.db, id), { 
                        attendance: arrayUnion(logEntry),
                        accredited: true 
                    });
                    if (!record.attendance) record.attendance = [];
                    record.attendance.push(logEntry);
                    record.accredited = true;
                } else {
                    await updateDoc(doc(db, activeConfig.db, id), { accredited: true });
                    record.accredited = true;
                }
                
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                renderUI(deskData);
            } catch(e) {
                alert("Check-in failed. Try again.");
                renderUI(deskData);
            }
        };
    </script>
</body>
</html>
